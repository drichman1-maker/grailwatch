<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #312e81 0%, #4f46e5 50%, #818cf8 100%);
      display: flex;
      flex-direction: column;
      padding: 60px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      position: relative;
      overflow: hidden;
    }
    .glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(129, 140, 248, 0.5) 0%, transparent 70%);
      top: -150px;
      right: -100px;
      border-radius: 50%;
    }
    .glow2 {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(79, 70, 229, 0.4) 0%, transparent 70%);
      bottom: -100px;
      left: -100px;
      border-radius: 50%;
    }
    .category {
      display: inline-block;
      padding: 8px 20px;
      background: rgba(255, 255, 255, 0.15);
      color: #c7d2fe;
      border-radius: 20px;
      font-size: 16px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 30px;
      width: fit-content;
    }
    .title {
      font-size: 52px;
      font-weight: 800;
      color: #fafafa;
      line-height: 1.2;
      margin-bottom: 30px;
      max-width: 900px;
    }
    .excerpt {
      font-size: 28px;
      color: #e0e7ff;
      line-height: 1.5;
      max-width: 800px;
      margin-bottom: 40px;
    }
    .footer {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #10B981 0%, #34D399 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    .brand-text {
      font-size: 32px;
      font-weight: 700;
      color: white;
    }
    .url {
      font-size: 24px;
      color: #6ee7b7;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="category">Buying Guide</div>
  <h1 class="title">Compression Therapy Systems</h1>
  <p class="excerpt">A Buyer's Guide: Don't overpay for underpowered systems. Learn which compression specs actually matter.</p>
  <div class="footer">
    <div class="brand">
      <div class="brand-icon">💚</div>
      <div class="brand-text">HealthIndex</div>
    </div>
    <div class="url">healthindex.app</div>
  </div>
</body>
</html>
