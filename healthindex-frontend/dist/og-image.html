<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #064e3b 0%, #065f46 50%, #047857 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      position: relative;
      overflow: hidden;
    }
    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.4) 0%, transparent 70%);
      top: -200px;
      right: -200px;
      border-radius: 50%;
    }
    .glow-2 {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(52, 211, 153, 0.3) 0%, transparent 70%);
      bottom: -100px;
      left: -100px;
      border-radius: 50%;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 40px;
    }
    .logo-icon {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #10B981 0%, #34D399 100%);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
    }
    .logo-text {
      font-size: 80px;
      font-weight: 800;
      color: white;
      letter-spacing: -2px;
    }
    .tagline {
      font-size: 42px;
      color: #a7f3d0;
      font-weight: 500;
      margin-bottom: 20px;
    }
    .features {
      display: flex;
      gap: 40px;
      margin-top: 30px;
    }
    .feature {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 28px;
      color: #d1fae5;
    }
    .feature-icon {
      font-size: 32px;
    }
    .url {
      position: absolute;
      bottom: 40px;
      font-size: 32px;
      color: #6ee7b7;
      font-weight: 600;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow-2"></div>
  <div class="logo">
    <div class="logo-icon">💚</div>
    <div class="logo-text">HealthIndex</div>
  </div>
  <div class="tagline">Medical Device Price Tracking</div>
  <div class="features">
    <div class="feature">
      <span class="feature-icon">🧖</span>
      <span>Saunas</span>
    </div>
    <div class="feature">
      <span class="feature-icon">🫧</span>
      <span>Hyperbaric</span>
    </div>
    <div class="feature">
      <span class="feature-icon">💡</span>
      <span>Red Light</span>
    </div>
  </div>
  <div class="url">healthindex.app</div>
</body>
</html>
