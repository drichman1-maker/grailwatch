<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0c0c0c;
            color: #f5f5f5;
            padding: 24px;
            line-height: 1.5;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid #2d2d2d;
        }
        .header-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #5e6ad2, #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        h1 {
            font-size: 24px;
            background: linear-gradient(90deg, #5e6ad2, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sop {
            background: #1a1a1a;
            border: 1px solid rgba(94, 106, 210, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
        }
        .sop h3 {
            color: #5e6ad2;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .sop p {
            color: #8a8a8a;
            font-size: 13px;
        }
        .section {
            margin-bottom: 24px;
        }
        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            margin-bottom: 16px;
            font-weight: 600;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }
        .card {
            background: #1a1a1a;
            border: 1px solid #2d2d2d;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .card:hover {
            border-color: #5e6ad2;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .card-title {
            font-weight: 500;
            font-size: 14px;
        }
        .status {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            color: white;
            font-weight: 500;
        }
        .status.priority { background: #ef4444; }
        .status.done { background: #10b981; }
        .status.iterate { background: #3b82f6; }
        .status.planning { background: #6b7280; }
        .card-desc {
            color: #6b7280;
            font-size: 12px;
        }
        .card-link {
            color: #5e6ad2;
            font-size: 11px;
            margin-top: 8px;
        }
        .task-list {
            space-y: 8px;
        }
        .task {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a1a;
            border: 1px solid #2d2d2d;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 8px;
        }
        .task-title {
            font-size: 14px;
        }
        .task-meta {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .task-status {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .task-status.todo { background: #2a2a2a; color: #8a8a8a; }
        .task-status.done { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .task-status.in-progress { background: #5e6ad2; color: white; }
        .affiliate-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        .affiliate-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a1a;
            border: 1px solid #2d2d2d;
            border-radius: 8px;
            padding: 12px;
        }
        .deadline {
            background: #1a1a1a;
            border: 1px solid #2d2d2d;
            border-radius: 8px;
            padding: 12px 16px;
            color: #5e6ad2;
            font-size: 14px;
        }
        .edit-link {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #5e6ad2;
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            text-decoration: none;
            font-size: 14px;
        }
        a { text-decoration: none; color: inherit; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-icon">🚀</div>
        <h1>Mission Control</h1>
    </div>

    <div class="sop">
        <h3>📋 Standard Operating Procedure</h3>
        <p>This dashboard is the source of truth. Check here first. Update when things change. Don't rebuild from scratch - iterate on what's deployed.</p>
    </div>

    <div class="section">
        <div class="section-title">🎯 Priority Projects</div>
        <div class="grid" id="priority-projects"></div>
    </div>

    <div class="section">
        <div class="section-title">📋 My Tasks</div>
        <div class="task-list" id="tasks"></div>
    </div>

    <div class="section">
        <div class="section-title">💰 Affiliates</div>
        <div class="affiliate-grid" id="affiliates"></div>
    </div>

    <div class="section">
        <div class="section-title">📅 Key Deadlines</div>
        <div id="deadlines"></div>
    </div>

    <a href="dashboard-data.json" class="edit-link" target="_blank">Edit Data</a>

    <script>
        // Load data from JSON file
        fetch('dashboard-data.json')
            .then(r => r.json())
            .then(data => {
                // Priority projects
                const priorityProjects = data.projects.filter(p => p.status === 'PRIORITY' || p.status === 'DONE');
                document.getElementById('priority-projects').innerHTML = priorityProjects.map(p => `
                    <a href="https://${p.domain}" target="_blank" class="card">
                        <div class="card-header">
                            <span class="card-title">${p.name}</span>
                            <span class="status ${p.status.toLowerCase()}">${p.status}</span>
                        </div>
                        <div class="card-desc">${p.shortDesc}</div>
                        <div class="card-link">${p.domain} →</div>
                        ${p.issue ? `<div style="color: #ef4444; font-size: 11px; margin-top: 4px;">⚠️ ${p.issue}</div>` : ''}
                    </a>
                `).join('');

                // Tasks
                document.getElementById('tasks').innerHTML = data.tasks.map(t => `
                    <div class="task">
                        <div>
                            <div class="task-title">${t.title}</div>
                            <div style="font-size: 11px; color: #6b7280; margin-top: 4px;">${t.project}</div>
                        </div>
                        <div class="task-meta">
                            <span class="task-status ${t.status}">${t.status}</span>
                            <span style="color: #5e6ad2; font-size: 12px;">${t.priority === 'high' ? '🔴' : t.priority === 'medium' ? '🟡' : '🟢'}</span>
                        </div>
                    </div>
                `).join('');

                // Affiliates
                document.getElementById('affiliates').innerHTML = data.affiliates.map(a => `
                    <div class="affiliate-item">
                        <div>
                            <div style="font-weight: 500; font-size: 14px;">${a.brand}</div>
                            <div style="font-size: 11px; color: #6b7280;">${a.commission}</div>
                        </div>
                        <span class="task-status ${a.status.toLowerCase().replace(/[()=]/g, '').replace(/\s+/g, '-')}">${a.status}</span>
                    </div>
                `).join('');

                // Deadlines
                document.getElementById('deadlines').innerHTML = data.deadlines.map(d => `
                    <div class="deadline">
                        <strong>${d.date}:</strong> ${d.note}
                    </div>
                `).join('');
            })
            .catch(err => {
                console.error('Failed to load:', err);
                document.body.innerHTML += '<div style="color: #ef4444; margin-top: 24px;">Error loading dashboard data. Check console.</div>';
            });
    </script>
</body>
</html>
