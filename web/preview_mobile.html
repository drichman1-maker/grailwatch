<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GrailWatch — Mobile Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-secondary: #1C1C1E;
            --ios-tertiary: #2C2C2E;
            --ios-blue: #0A84FF;
            --ios-green: #30D158;
            --ios-red: #FF453A;
            --text-main: #FFFFFF;
            --text-secondary: #8E8E93;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #121212;
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* ── Phone Frame ── */
        .phone-frame {
            width: 375px;
            height: 812px;
            background: var(--ios-bg);
            border-radius: 44px;
            border: 8px solid #333;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
        }

        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 30px;
            background: #333;
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 18px;
            z-index: 100;
        }

        /* ── App Content ── */
        .app-header {
            padding: 60px 20px 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 90;
        }

        .app-header h1 {
            font-size: 34px;
            font-weight: 700;
        }

        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        /* ── Cards ── */
        .alert-card {
            background: linear-gradient(135deg, #0A84FF 0%, #004080 100%);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }

        .section-label {
            font-size: 13px;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        .watchlist-item {
            background: var(--ios-secondary);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
            align-items: center;
        }

        .thumb {
            width: 60px;
            height: 80px;
            background: var(--ios-tertiary);
            border-radius: 8px;
            overflow: hidden;
        }

        .info {
            flex: 1;
        }

        .title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-weight: 700;
            color: var(--ios-blue);
        }

        .trend {
            font-size: 13px;
            color: var(--ios-green);
            font-weight: 600;
        }

        /* ── Tab Bar ── */
        .tab-bar {
            height: 84px;
            background: rgba(28, 28, 30, 0.9);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-around;
            padding-top: 12px;
            position: absolute;
            bottom: 0;
            width: 100%;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            color: var(--text-secondary);
        }

        .tab-item.active {
            color: var(--ios-blue);
        }

        .tab-item i {
            width: 24px;
            height: 24px;
        }
    </style>
</head>

<body>

    <div class="phone-frame">
        <div class="notch"></div>

        <header class="app-header">
            <h1>Grails</h1>
        </header>

        <div class="content-scroll">
            <div class="alert-card">
                <i data-lucide="bell-ring" style="margin-top: 4px;"></i>
                <div>
                    <h3 style="font-size: 17px; margin-bottom: 4px;">Price Alert</h3>
                    <p style="font-size: 14px; opacity: 0.9;">ASM #300 (CGC 9.8) just dropped to $5,100 on eBay.</p>
                </div>
            </div>

            <p class="section-label">Your Watchlist</p>

            <div class="watchlist-item">
                <div class="thumb"><img
                        src="https://images.unsplash.com/photo-1588497859490-85d1c17db96d?auto=format&fit=crop&q=80&w=200"
                        style="width: 100%; height: 100%; object-fit: cover;"></div>
                <div class="info">
                    <div class="title">ASM #300</div>
                    <div class="price-row">
                        <span class="price">$5,240</span>
                        <span class="trend">+2.4%</span>
                    </div>
                </div>
                <i data-lucide="chevron-right" style="color: var(--text-secondary);"></i>
            </div>

            <div class="watchlist-item">
                <div class="thumb"><img
                        src="https://images.unsplash.com/photo-1620336655174-3258593466ae?auto=format&fit=crop&q=80&w=200"
                        style="width: 100%; height: 100%; object-fit: cover;"></div>
                <div class="info">
                    <div class="title">Hulk #181</div>
                    <div class="price-row">
                        <span class="price">$8,900</span>
                        <span class="trend">+1.2%</span>
                    </div>
                </div>
                <i data-lucide="chevron-right" style="color: var(--text-secondary);"></i>
            </div>

            <div class="watchlist-item">
                <div class="thumb"><img
                        src="https://images.unsplash.com/photo-1612036782180-6f0b6cd846fe?auto=format&fit=crop&q=80&w=200"
                        style="width: 100%; height: 100%; object-fit: cover;"></div>
                <div class="info">
                    <div class="title">GS X-Men #1</div>
                    <div class="price-row">
                        <span class="price">$4,150</span>
                        <span class="trend" style="color: var(--text-secondary);">0.0%</span>
                    </div>
                </div>
                <i data-lucide="chevron-right" style="color: var(--text-secondary);"></i>
            </div>

            <div class="watchlist-item">
                <div class="thumb"></div>
                <div class="info">
                    <div class="title">X-Men #101</div>
                    <div class="price-row">
                        <span class="price">$1,450</span>
                        <span class="trend" style="color: var(--ios-red);">-0.4%</span>
                    </div>
                </div>
                <i data-lucide="chevron-right" style="color: var(--text-secondary);"></i>
            </div>
        </div>

        <nav class="tab-bar">
            <div class="tab-item active">
                <i data-lucide="eye"></i>
                <span>Watchlist</span>
            </div>
            <div class="tab-item">
                <i data-lucide="compass"></i>
                <span>Explore</span>
            </div>
            <div class="tab-item">
                <i data-lucide="shield"></i>
                <span>Vault</span>
            </div>
            <div class="tab-item">
                <i data-lucide="user"></i>
                <span>Profile</span>
            </div>
        </nav>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
