<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrailWatch — Discovery Engine Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&family=JetBrains+Mono:wght@500;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-primary: #0A0C10;
            --bg-secondary: #14171C;
            --bg-card: #1C2128;
            --accent: #00D1FF;
            --accent-glow: rgba(0, 209, 255, 0.3);
            --emerald: #00FF94;
            --gold: #FFD700;
            --text-primary: #F0F6FC;
            --text-secondary: #8B949E;
            --text-tertiary: #484F58;
            --border: #30363D;
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --font-main: 'Inter', sans-serif;
            --font-display: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
        }

        header {
            height: 72px;
            background: rgba(10, 12, 16, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 40px;
        }

        .search-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 40px;
        }

        .filter-bar {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 32px;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-tag {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-tag:hover,
        .filter-tag.active {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 32px;
        }

        .comic-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: transform 0.3s;
            cursor: pointer;
        }

        .comic-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .card-image {
            aspect-ratio: 2/3;
            background: #222;
            position: relative;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .grade-pill {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.8);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            border: 1px solid var(--border);
        }

        .card-info {
            padding: 16px;
        }

        .card-info h3 {
            font-size: 14px;
            margin-bottom: 4px;
        }

        .card-info p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .card-price {
            margin-top: 12px;
            font-weight: 700;
            font-family: 'JetBrains Mono';
            color: var(--accent);
        }
    </style>
</head>

<body>
    <header>
        <div style="font-family: 'Outfit'; font-weight: 800; font-size: 20px;">GRAIL<span>WATCH</span></div>
        <nav style="margin-left: 40px; display: flex; gap: 24px; font-size: 14px; font-weight: 500;">
            <a href="preview_home.html" style="color: var(--text-secondary); text-decoration: none;">Command Center</a>
            <a href="#" style="color: var(--text-primary); text-decoration: none;">Discovery</a>
            <a href="#" style="color: var(--text-secondary); text-decoration: none;">Vault</a>
        </nav>
    </header>

    <div class="search-container">
        <h1 style="font-family: 'Outfit'; margin-bottom: 24px;">Discovery Engine</h1>

        <div class="filter-bar">
            <div
                style="display: flex; align-items: center; gap: 10px; color: var(--text-secondary); font-size: 14px; margin-right: 12px;">
                <i data-lucide="filter" size="18"></i> Filters:
            </div>
            <div class="filter-tag active">Marvel Comics <i data-lucide="x" size="14"></i></div>
            <div class="filter-tag">Bronze Age</div>
            <div class="filter-tag">Key Issues Only</div>
            <div class="filter-tag">Grade 9.0+</div>
            <div style="margin-left: auto; color: var(--accent); font-size: 13px; font-weight: 600; cursor: pointer;">
                Clear All</div>
        </div>

        <div class="results-grid">
            <!-- Items -->
            <div class="comic-card">
                <div class="card-image">
                    <img src="https://images.unsplash.com/photo-1594909122845-11baa439b7bf?auto=format&fit=crop&q=80&w=300"
                        alt="Cover">
                    <div class="grade-pill">CGC 9.8</div>
                </div>
                <div class="card-info">
                    <h3>X-Men #101</h3>
                    <p>1st Phoenix</p>
                    <div class="card-price">$1,250.00</div>
                </div>
            </div>
            <!-- Repeat for demo -->
            <div class="comic-card">
                <div class="card-image">
                    <img src="https://images.unsplash.com/photo-1620336655174-3258593466ae?auto=format&fit=crop&q=80&w=300"
                        alt="Cover">
                    <div class="grade-pill" style="color: var(--gold);">CGC 9.6</div>
                </div>
                <div class="card-info">
                    <h3>Hulk #181</h3>
                    <p>1st Wolverine</p>
                    <div class="card-price">$8,900.00</div>
                </div>
            </div>
            <div class="comic-card">
                <div class="card-image">
                    <img src="https://images.unsplash.com/photo-1612036782180-6f0b6cd846fe?auto=format&fit=crop&q=80&w=300"
                        alt="Cover">
                    <div class="grade-pill">CGC 9.4</div>
                </div>
                <div class="card-info">
                    <h3>GS X-Men #1</h3>
                    <p>New Team</p>
                    <div class="card-price">$4,150.00</div>
                </div>
            </div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>

</html>
